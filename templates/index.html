<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>RESVI</title>
  <link rel="icon" href="{{ url_for('static', filename='img/logo.png') }}?v={{ asset_version }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ asset_version }}" />
</head>
<body>
  <!-- Splash: logo + tagline, ~2 seconds. -->
  <div class="splash" id="splash">
    <div class="splash-inner">
      <img class="logo" src="{{ url_for('static', filename='img/logo.png') }}?v={{ asset_version }}" alt="RESVI" />
      <div class="tagline">Retail Products Store</div>
    </div>
  </div>

  <div id="app">
    <aside id="sidebar" class="sidebar"></aside>
    <div id="view"><!-- screens render here --></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="{{ url_for('static', filename='js/api.js') }}?v={{ asset_version }}"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}?v={{ asset_version }}"></script>
</body>
</html>
